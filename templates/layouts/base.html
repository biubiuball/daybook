{{define "base"}}
<!doctype html>
<html lang="zh-CN">
{{template "head" .}}
<body class="{{.BodyClass}}" data-page-kind="{{.PageKind}}" data-search-index-url="/search.json">
  {{template "persistent_logo" .}}

  <div class="page-frame" id="daybook-page" data-daybook-page>
  {{if eq .PageTitle "首页"}}
  {{template "header_nav" .}}

  <main class="site-main{{if eq .PageTitle "首页"}} home-main{{end}}">
    <div id="main-content-wrapper">
      {{template "content" .}}
    </div>
  </main>
  {{else}}
  <div class="page-shell">
    {{template "side_nav" .}}

    <main class="site-main page-main">
      <div id="main-content-wrapper">
        {{template "content" .}}
      </div>
    </main>
  </div>
  {{end}}
  </div>
  {{template "mobile_drawer" .}}
  {{template "mobile_overlay" .}}
  <script type="module">
    let walineLoader = null;
    document.addEventListener("daybook:page-load", async () => {
      const container = document.getElementById("waline");
      if (container) {
        if (!walineLoader) {
          walineLoader = await import("{{.Assets.Path "/js/waline-loader.js"}}");
        }
        walineLoader.setupWaline();
      } else if (walineLoader) {
        walineLoader.setupWaline(); // setupWaline will destroy it if no container
      }
    });
  </script>
</body>
</html>
{{end}}
