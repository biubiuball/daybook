{{define "side_nav"}}
<aside class="side-rail" aria-label="站点导航">
  <a class="side-avatar-link" href="/" aria-label="回到首页">
    <img class="side-avatar" src="/images/avatar/shelby.jpg" alt="史帙头像">
  </a>

  <nav class="side-nav" aria-label="主导航">
    <a class="nav-link" href="/">
      <span class="nav-icon material-symbol" aria-hidden="true">home</span>
      <span class="nav-label">首页</span>
    </a>
    <a class="nav-link" href="/notes/">
      <span class="nav-icon material-symbol" aria-hidden="true">article</span>
      <span class="nav-label">文章</span>
    </a>
    <a class="nav-link" href="/archive/">
      <span class="nav-icon material-symbol" aria-hidden="true">archive</span>
      <span class="nav-label">归档</span>
    </a>
    <a class="nav-link" href="/graph/">
      <span class="nav-icon material-symbol" aria-hidden="true">account_tree</span>
      <span class="nav-label">关系图谱</span>
    </a>
    <a class="nav-link" href="/about/">
      <span class="nav-icon material-symbol" aria-hidden="true">info</span>
      <span class="nav-label">关于</span>
    </a>
  </nav>

  {{if eq .PageKind "note"}}
  <div class="desktop-reading-controls" aria-label="阅读控制" aria-hidden="true">
    <button class="reading-control-btn back-to-top-btn" type="button" aria-label="回到顶部">
      <span class="material-symbol" aria-hidden="true">arrow_upward</span>
    </button>
    <button class="reading-control-btn reading-progress-btn" type="button" aria-label="前往底部">
      <span class="reading-progress-text" data-desktop-progress-text>0</span>
      <span class="material-symbol hover-icon" aria-hidden="true">arrow_downward</span>
    </button>
  </div>
  {{end}}
</aside>
{{end}}
