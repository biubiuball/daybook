{{define "note_card"}}
<article class="notes-item" data-note-card data-search-title="{{.Title}}" data-search-summary="{{.Summary}}" data-tags="{{range .Tags}}{{.}}&#10;{{end}}">
  <div class="notes-item-header">
    <h1 class="notes-item-title">
      <a href="{{.URL}}" data-title-transition-key="{{.Slug}}">
        {{.TitleLayout}}
      </a>
      {{if .Pin}}
        <span class="notes-item-pin" aria-hidden="true" title="已固定"></span>
      {{end}}
    </h1>
    <p class="notes-item-meta">
      <span class="meta-transition-group" data-meta-transition-key="{{.Slug}}">
        <time datetime="{{.Date}}" data-date-transition-key="{{.Slug}}">{{.Date}}</time>
        <span>{{.ReadingMinutes}} min</span>
      </span>
    </p>
  </div>
  {{with .Summary}}<p class="notes-item-summary">{{.}}</p>{{end}}
</article>
{{end}}
