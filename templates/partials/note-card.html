{{define "note_card"}}
<article class="notes-item" data-note-card data-search-title="{{.Title}}" data-search-summary="{{.Summary}}" data-tags="{{range .Tags}}{{.}}&#10;{{end}}" data-tag-ids="{{range .TagIDs}}{{.}}&#10;{{end}}">
  <div class="notes-item-header">
    <h1 class="notes-item-title">
      <a href="{{.URL}}" data-title-transition-key="{{.Slug}}">
        {{.TitleLayout}}
      </a>
      {{if .Pin}}
        <span class="notes-item-pin" aria-hidden="true" title="已固定"></span>
      {{end}}
      {{if .HasTranslation}}
        <span class="material-symbol notes-item-bilingual" aria-hidden="true" title="双语">translate</span>
      {{end}}
    </h1>
    <p class="notes-item-meta">
      <span class="meta-transition-group" data-meta-transition-key="{{.Slug}}">
        <time datetime="{{.Date}}" data-date-transition-key="{{.Slug}}">{{.Date}}</time>
        <span class="reading-time">{{.ReadingMinutes}} {{T .Lang "post.min_read"}}</span>
        {{if .Updated}}
          <span class="updated-time">&bull; updated <time datetime="{{.Updated}}">{{.Updated}}</time></span>
        {{end}}
      </span>
    </p>
  </div>
  {{with .Summary}}<p class="notes-item-summary">{{.}}</p>{{end}}
</article>
{{end}}
