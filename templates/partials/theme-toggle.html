{{define "theme_toggle_header"}}
<button class="notes-action-button header-theme-toggle theme-toggle" type="button" aria-label="切换亮暗模式">
  <span class="material-symbol" aria-hidden="true">dark_mode</span>
</button>
<button class="notes-action-button header-theme-toggle eye-care-toggle" type="button" aria-label="切换主题" aria-pressed="true">
  <span class="material-symbol" aria-hidden="true">palette</span>
</button>
{{end}}

{{define "theme_toggle_action"}}
<button class="notes-action-button theme-toggle" type="button" aria-label="切换亮暗模式" data-tooltip="切换亮暗模式">
  <span class="material-symbol" aria-hidden="true">dark_mode</span>
</button>
<button class="notes-action-button eye-care-toggle" type="button" aria-label="切换主题" aria-pressed="true" data-tooltip="切换主题">
  <span class="material-symbol" aria-hidden="true">palette</span>
</button>
{{end}}
