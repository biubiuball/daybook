{{define "content"}}
<section class="about-page" aria-label="关于">
  {{template "golden_spiral" .}}

  <div class="about-content">
    <h1>{{.Title}}</h1>
    {{with .Summary}}<p class="about-summary">{{.}}</p>{{end}}
    <div class="markdown about-markdown">
      {{.HTML}}
    </div>
    <div class="about-meta">
      <time datetime="{{.Date}}">{{.Date}}</time>
      <span class="about-meta-group">
        <span data-page-views data-path="/about/">--</span>
        <span data-page-views-label data-path="/about/">views</span>
      </span>
    </div>
  </div>
</section>
{{end}}
