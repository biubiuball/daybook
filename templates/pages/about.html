{{define "content"}}
<section class="about-page" aria-label="{{T .Lang "about.title"}}">
  {{template "golden_spiral" .}}

  <div class="about-content">
    <h1>
      {{.Title}}
      {{if .HasTranslation}}
      <span class="note-bilingual-wrapper">
        <button type="button" class="bilingual-toggle-btn" aria-label="Toggle Bilingual Translation" data-current-lang="{{.Lang}}" data-alt-fragment-url="{{if eq .Lang "en"}}/about/fragment.json{{else}}/en/about/fragment.json{{end}}">
          <span class="bilingual-char bilingual-zh">中</span>
          <span class="bilingual-char bilingual-en">En</span>
        </button>
      </span>
      {{end}}
    </h1>
    {{with .Summary}}<p class="about-summary note-summary">{{.}}</p>{{end}}
    <div class="markdown about-markdown post-content">
      {{.HTML}}
    </div>
    <div class="about-meta">
      <div class="about-time-group">
        <time datetime="{{.Date}}">{{.Date}}</time>
        {{if .Updated}}
        <br><span class="about-updated">updated <time datetime="{{.Updated}}">{{.Updated}}</time></span>
        {{end}}
      </div>
      <span class="about-meta-group">
        <span data-page-views data-path="/about/">--</span>
        <span data-page-views-label data-path="/about/">views</span>
      </span>
    </div>
  </div>
</section>
{{end}}
