{{define "content"}}
<div class="notes-page">
  <section class="notes-list article-stage" aria-label="文章列表">
    {{if .Notes}}
      {{range .Notes}}
        {{template "note_card" .}}
      {{end}}
    {{else}}
      <p class="notes-empty">还没有发布的文章。</p>
    {{end}}
  </section>

  {{template "notes_aside" .}}
</div>
{{end}}
