{{define "content"}}
<div class="notes-page">
  <section class="notes-list article-stage" aria-label="文章列表">
    <div class="tag-back-container" id="tag-back-container" hidden>
      <button class="tag-back-btn" id="tag-back-btn" aria-label="返回上一页" type="button">
        <span class="material-symbol" aria-hidden="true">arrow_back</span>
      </button>
      <h2 class="tag-back-title" id="tag-back-title"></h2>
    </div>

    {{if .PinnedNotes}}
      <div class="notes-pinned">
        <div class="notes-month-list">
          {{range .PinnedNotes}}
            {{template "note_card" .}}
          {{end}}
        </div>
      </div>
      <hr class="notes-divider">
    {{end}}

    {{if .MonthGroups}}
      {{range .MonthGroups}}
        <div class="notes-month">
          <div class="notes-month-list">
            {{range .Notes}}
              {{template "note_card" .}}
            {{end}}
          </div>
        </div>
      {{end}}
      {{else}}
      <p class="notes-empty">还没有发布的文章。</p>
    {{end}}
    <p class="notes-empty notes-filter-empty" hidden>没有找到匹配的文章。</p>
  </section>

  {{template "notes_aside" .}}
</div>
{{end}}
