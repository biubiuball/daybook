{{define "content"}}
<div class="notes-page note-detail-page{{if .Note.Headings}} has-toc{{end}}">
  <section class="note-detail article-stage" aria-label="文章详情">
    <article class="note" data-has-mermaid="{{if .Note.HasMermaid}}true{{else}}false{{end}}" data-has-math="{{if .Note.HasMath}}true{{else}}false{{end}}">
      <a class="note-back-link" href="/notes/" aria-label="返回文章列表">
        <span class="material-symbol" aria-hidden="true">arrow_back</span>
      </a>

      <header class="note-header">
        <h1 class="note-title">
          <span data-title-transition-name="{{.Note.TitleTransitionName}}">{{.Note.Title}}</span>
        </h1>
        <p class="note-meta" data-meta-transition-name="{{.Note.DateTransitionName}}">
          <time datetime="{{.Note.Date}}">{{.Note.Date}}</time>
          <span>{{.Note.ReadingTime}}</span>
        </p>
        {{with .Note.Summary}}<p class="note-summary">{{.}}</p>{{end}}
      </header>

      {{template "toc" .}}

      <div class="markdown post-content">
        {{.Note.HTML}}
      </div>
    </article>
  </section>

  {{template "notes_aside" .}}
</div>
{{end}}
